<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BA0CA"/>
      <stop offset="100%" stop-color="#4A7AA8"/>
    </linearGradient>
    <linearGradient id="topShine" x1="0" y1="0" x2="0" y2="0.5">
      <stop offset="0%" stop-color="#8BBEDD" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8BBEDD" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7BA7C9" stop-opacity="0"/>
      <stop offset="20%" stop-color="#7BA7C9"/>
      <stop offset="80%" stop-color="#7BA7C9"/>
      <stop offset="100%" stop-color="#7BA7C9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EDF2"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="url(#bgGrad)" filter="url(#softShadow)"/>
  <rect x="16" y="16" width="224" height="112" rx="48" ry="48" fill="url(#topShine)"/>
  <rect x="16" y="220" width="224" height="8" rx="4" ry="4" fill="url(#accentBar)"/>
  <rect x="16" y="64" width="3" height="160" fill="#7BA7C9" opacity="0.8" rx="1.5"/>
  <rect x="237" y="64" width="3" height="160" fill="#7BA7C9" opacity="0.8" rx="1.5"/>
  <text x="128" y="172" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="128" font-weight="bold" fill="url(#textGrad)" filter="url(#softShadow)">S</text>
</svg>
